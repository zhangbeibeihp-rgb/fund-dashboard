<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金组合管理仪表盘</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.splash {
  text-align: center;
  animation: fadeIn .6s ease;
}
.splash h1 { font-size: 1.8rem; margin-bottom: .5rem; }
.splash p { color: #94a3b8; font-size: .95rem; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(99,102,241,.2);
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 1.5rem auto 0;
}
.error-msg {
  margin-top: 1.5rem;
  background: rgba(239,68,68,.15);
  border: 1px solid rgba(239,68,68,.3);
  color: #fca5a5;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: .9rem;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="splash">
  <h1>📊 基金组合管理仪表盘</h1>
  <p>加载中，请稍候…</p>
  <div class="spinner"></div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script src="src/config.js"></script>
<script src="src/supabase.js"></script>
<script>
(async function() {
  try {
    const client = await initSupabase();
    if (!client) {
      document.getElementById('errorMsg').textContent = '数据库连接失败，请检查 config.js 配置';
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }
    const { data: { session }, error } = await client.auth.getSession();
    if (error) throw error;
    if (session) {
      location.replace('portfolio-rebalance-dashboard.html');
    } else {
      location.replace('login.html');
    }
  } catch (e) {
    console.error('[Index] 跳转失败:', e);
    document.getElementById('errorMsg').textContent = '认证检查失败: ' + e.message;
    document.getElementById('errorMsg').style.display = 'block';
  }
})();
</script>
</body>
</html>
